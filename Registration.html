<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
   
</head>
<body>
    <div class="container mt-4">
        <div class="card shadow">
             <div class="card-header text-center bg-warning">Registration</h1></div>
            <div class="card-body">
                <div id="successMsg" class="alert alert-success d-none"> Registration Successful! </div>
              
                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" class="form-control" placeholder="Enter mobile number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <input type="radio" name="gender">Female
                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Others
                </div>
                <div class="mb-3">
                    <label class="form-label">Course Selection</label>
                   <select class="form-select">
                    <option>Java</option>
                    <option>Web Development</option>
                    <option>Data Science</option>
                    <option>Cyber Security</option>
                    <option>Python</option>
                    <option>AI&ML</option>
                   </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Qualification</label>
                   <select class="form-select">
                   <option>BCA</option>
                    <option>B.Tech</option>
                     <option>B.Sc</option>
                      <option>MCA</option> 
                      <option>MBA</option>
                   </select>
                </div>

                <div class="mb-3">
                    <label for="form-label">Address</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="form-label">Upload file</label>
                  <input type="file" class="form-control">
                </div>

           <label>
            <input type="checkbox" required> I agree to the Terms & Conditions
           </label>
           <div class="text-center">
           <button class="btn btn-success">Submit</button>
           </div>
            </div>
        </div>
    </div>
    <script> document.getElementById("regForm").addEventListener("submit", function(e) { e.preventDefault(); document.getElementById("successMsg").classList.remove("d-none"); this.reset(); }); </script>
</body>
</html>
