<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Page 5</title>
    <!-- Bootstrap 5 CSS CDN -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <!-- Section Heading -->
    <div class="text-center mb-5">
        <h1 class="fw-bold text-dark">Contact Us</h1>
        <p class="text-muted mx-auto" style="max-width: 600px;"> We would love to hear from you. Please fill out the form below or drop by our office location.</p>
    </div>

    <div class="row g-4">
        <!-- Left Column: Contact Form -->
        <div class="col-lg-6">
            <div class="card h-100 shadow-sm border-0 p-4">
                <h3 class="h4 mb-4 text-primary fw-semibold">Send a Message</h3>
                <form id="contactForm" novalidate>
                    <!-- Name Field -->
                    <div class="mb-3">
                        <label for="userName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="userName" placeholder="John Doe" required>
                    </div>
                    
                    <!-- Email Field -->
                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="userEmail" placeholder="name@example.com" required>
                    </div>

                    <!-- Subject Field -->
                    <div class="mb-3">
                        <label for="formSubject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="formSubject" placeholder="How can we help you?" required>
                    </div>

                    <!-- Message Field -->
                    <div class="mb-3">
                        <label for="userMessage" class="form-label">Your Message</label>
                        <textarea class="form-control" id="userMessage" rows="5" placeholder="Type your message here..." required></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-send-fill me-2"></i>Submit Message
                    </button>
                </form>
            </div>
        </div>

        <!-- Right Column: Map and Details -->
        <div class="col-lg-6 d-flex flex-column justify-content-between">
            <!-- Google Map Placeholder Block -->
            <div class="card shadow-sm border-0 overflow-hidden mb-4 flex-grow-1" style="min-height: 300px;">
                <!-- Replace with an <iframe> from Google Maps or a map initialized with the JavaScript API -->
                <iframe 
                    class="w-100 h-100 border-0"
                    src="https://google.com" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <!-- Address & Info Block -->
            <div class="card shadow-sm border-0 p-4">
                <h3 class="h4 mb-4 text-primary fw-semibold">Our Information</h3>
                
                <!-- Physical Address -->
                <div class="d-flex align-items-start mb-3">
                    <div class="bg-primary-subtle text-primary rounded px-3 py-2 me-3">
                        <i class="bi bi-geo-alt-fill fs-5"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 fw-bold text-dark">Office Address</h6>
                        <p class="text-muted mb-0">350 5th Ave, New York, NY 10118, USA</p>
                    </div>
                </div>

                <!-- Phone Contact -->
                <div class="d-flex align-items-start mb-3">
                    <div class="bg-primary-subtle text-primary rounded px-3 py-2 me-3">
                        <i class="bi bi-telephone-fill fs-5"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 fw-bold text-dark">Phone Number</h6>
                        <p class="text-muted mb-0">+1 (212) 736-3100</p>
                    </div>
                </div>

                <!-- Email Contact -->
                <div class="d-flex align-items-start">
                    <div class="bg-primary-subtle text-primary rounded px-3 py-2 me-3">
                        <i class="bi bi-envelope-fill fs-5"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 fw-bold text-dark">Email Support</h6>
                        <p class="text-muted mb-0">support@yourdomain.com</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap 5 JavaScript Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
